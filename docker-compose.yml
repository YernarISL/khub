services:
  db:
    image: postgres:15
    container_name: main_postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
  
  # База данных для LMS
  lms_db:
    image: postgres:15
    container_name: lms_postgres_db
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      - ./server/sql/lms:/docker-entrypoint-initdb.d
  