services:
  db:
    image: postgres:15
    container_name: main_postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - ./server/sql/lms:/docker-entrypoint-initdb.d
      - main_db_data:/var/lib/postgresql/data
    
volumes:
  main_db_data: